version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: supervisao_whatsapp
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/supervisao_whatsapp
      UAZAPI_TOKEN: dev-token
      TEAM_PHONES: ''
      TEAM_NAMES: ''
      NODE_ENV: development
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      - db

volumes:
  pgdata:
